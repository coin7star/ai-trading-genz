<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Remote Control 🚀</title>
    <style>
        body {
            background-color: #07090e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #0f1322;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
            width: 100%;
            max-width: 400px;
            border: 1px solid #1b223c;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #00ffaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #8b9bb4;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #131a30;
            border: 1px solid #2a3454;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #00ffaa;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #00ffaa;
            color: #07090e;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 Remote Test Telegram</h2>
    
    <div class="form-group">
        <label>Skenario Test (Pilih Sinyal):</label>
        <select id="scenario" onchange="autoFill()">
            <option value="buy">🚀 Test Sinyal BUY (MFI Jenuh Bawah)</option>
            <option value="sell">🔥 Test Sinyal SELL (MFI Jenuh Atas)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Pair & Timeframe:</label>
        <input type="text" id="pair" value="XAUUSD+ (TEST-WEB)" disabled>
    </div>

    <div class="form-group">
        <label>Status Trend (EMA):</label>
        <input type="text" id="trend" value="EMA 9 > 20 (UPTREND)">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>MFI Level:</label>
            <input type="number" id="mfi" value="25">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Nilai ATR:</label>
            <input type="number" step="0.01" id="atr" value="0.75">
        </div>
    </div>

    <button id="btnSend" onclick="kirimData()">GAS TEMBAK NOTIF! 💥</button>
    <div id="status"></div>
</div>

<script>
    // Fungsi biar angkanya ganti otomatis pas milih Buy atau Sell
    function autoFill() {
        const scenario = document.getElementById('scenario').value;
        if (scenario === 'buy') {
            document.getElementById('trend').value = "EMA 9 > 20 (UPTREND)";
            document.getElementById('mfi').value = 25; // Di bawah 30 = Buy
        } else {
            document.getElementById('trend').value = "EMA 9 < 20 (DOWNTREND)";
            document.getElementById('mfi').value = 75; // Di atas 70 = Sell
        }
    }

    // Fungsi utama buat ngirim data ke Cloudflare lo
    async function kirimData() {
        const btn = document.getElementById('btnSend');
        const statusText = document.getElementById('status');
        
        btn.innerText = "MENGIRIM DATA... ⏳";
        btn.style.backgroundColor = "#ffb300";
        btn.disabled = true;
        statusText.innerText = "";
        statusText.style.color = "#ffb300";

        const payload = {
            pair: "XAUUSD+ (TEST-WEB)",
            timeframe: "M2",
            mfi_level: Number(document.getElementById('mfi').value),
            fib_status: document.getElementById('trend').value,
            atr_value: parseFloat(document.getElementById('atr').value)
        };

        try {
            // URL ini nembak langsung ke API Cloudflare lo yang aktif
            const response = await fetch("https://ai-trading-genz.pages.dev/api/market-status", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            
            if (response.ok) {
                statusText.innerText = "✅ Sukses! Cek Telegram lo sekarang!";
                statusText.style.color = "#00ffaa";
                btn.style.backgroundColor = "#00ffaa";
            } else {
                statusText.innerText = "❌ Error: " + (data.error || "Gagal kirim.");
                statusText.style.color = "#ff3366";
                btn.style.backgroundColor = "#ff3366";
            }
        } catch (error) {
            statusText.innerText = "❌ Error Koneksi: " + error.message;
            statusText.style.color = "#ff3366";
            btn.style.backgroundColor = "#ff3366";
        } finally {
            btn.innerText = "GAS TEMBAK NOTIF! 💥";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
